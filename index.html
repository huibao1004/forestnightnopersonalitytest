    let currentIndex = 0;
    let scores = { "E": 0, "A": 0, "C": 0, "S": 0, "O": 0 };
    let rawAnswers = []; // 紀錄玩家每一次點擊的分數

    function startTest() {
        document.getElementById('home-section').classList.remove('active');
        document.getElementById('quiz-section').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIndex];
        // 注意此處為 innerHTML 讓 <br> 標籤可以換行
        document.getElementById('question-text').innerHTML = q.text;
        document.getElementById('question-counter').innerText = `${currentIndex + 1} / ${questions.length}`;
        const progressPercent = ((currentIndex) / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;
    }

    function selectAnswer(score) {
        const q = questions[currentIndex];
        let finalScore = q.reverse ? (6 - score) : score;
        scores[q.trait] += finalScore;

        rawAnswers.push(score);

        currentIndex++;
        if (currentIndex < questions.length) {
            showQuestion();
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        // 檢查是否15題全部選了一模一樣的選項
        const allSame = rawAnswers.every(val => val === rawAnswers[0]);

        if (allSame && rawAnswers.length === questions.length) {
            // 【觸發彩蛋】：隱藏動物卡片與常規按鈕
            document.getElementById('result-content').style.display = "none";
            document.getElementById('download-btn').style.display = "none";
            document.getElementById('share-btn').style.display = "none";
            
            // 顯示大禮包按鈕
            document.getElementById('rickroll-btn').style.display = "block";
            alert("⚠️ 系統偵測到異常的執念... 隱藏機關已觸發hahaha！");
            
        } else {
            // 【常規模式】：確保彩蛋按鈕隱藏，顯示動物卡片與常規按鈕
            document.getElementById('result-content').style.display = "block";
            document.getElementById('download-btn').style.display = "block";
            document.getElementById('share-btn').style.display = "block";
            document.getElementById('rickroll-btn').style.display = "none";

            // 常規計算邏輯：照常計算出最高分的動物
            let highestTrait = "E";
            let maxScore = 0;
            
            for (const [trait, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    highestTrait = trait;
                }
            }

            const result = resultsData[highestTrait];

            // 渲染畫面
            document.getElementById('result-img').src = result.img;
            document.getElementById('result-name').innerText = result.name;
            document.getElementById('result-role').innerText = result.role;

            const tagsHtml = result.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            document.getElementById('result-tags').innerHTML = tagsHtml;

            document.getElementById('result-desc').innerHTML = result.desc;
        }

        // 切換頁面顯示
        document.getElementById('quiz-section').classList.remove('active');
        document.getElementById('result-section').classList.add('active');
    }

    function downloadResult() {
        const resultContent = document.getElementById('result-content');

        html2canvas(resultContent, {
            scale: 2,
            backgroundColor: "#FFFFFF",
            useCORS: true,
            scrollY: -window.scrollY
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = '我的森林代表物.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    function shareResult() {
        if (navigator.share) {
            navigator.share({
                title: '在森林之中，你的代表物是？',
                text: '我剛完成了這個療癒的大五人格心理測驗，快來測測看你是哪種森林代表物！',
                url: window.location.href
            }).catch(console.error);
        } else {
            alert('複製網址分享給朋友吧：\n' + window.location.href);
        }
    }
</script>
